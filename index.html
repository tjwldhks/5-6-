<!DOCTYPE html>
<html>
    <head>
        <title>자기소개 페이지</title>
        <style>
            /*과제 1번에 쓰이는 css입니다.*/
            h1{
                font-size: 40px;
                color: rgb(63, 140, 247);
                text-align: center;
                background-color:rgb(185, 225, 248) ;
            }
            p{
                text-align: center;
                color:rgb(60, 95, 252);

            }
            .font-big {font-size: 50px;}
            .font-weight{font-weight:bold;}

            /*과제 2번에 쓰이는 css입니다.*/
            input[type="text"]{
            background-color: lightpink;
            height:30px;
            }

            input[type="password"]{
            background-color: lightblue;
            height:30px;}
            
            /*과제 3번에 쓰이는 css입니다.*/
            .btn{
                width:120px;
                height:50px;    
                background-color: orange;
                color: white;
                text-align: center;
                line-height: 50px;
                border-radius: 10px;
                margin-top:20px;
            }            
        </style>       
    </head>
    <body>
        <!--과제 1번 입니다.-->
        <h1 class="font-big">자기소개</h1>
        <p>복학하여 학교생활 적응 중인 컴퓨터공학과 2학년 학생</p>
        <p class="font-weight">#복학생 #동서대 #컴퓨터공학과 #컴공 #2학년</p>
        <ul>
            <li>이름: 서지완</li>
            <li>나이: 23세</li>
            <li>사는 곳: 경남 거제시</li>
            <li>취미: 음악듣기, 해외축구 시청</li>
        </ul>
         <!--과제 2번 입니다.-->
        <input type="text">
        <input type="password">
         <!--과제 3번 입니다.--> 
        <div class="btn">Click</div>
    </body>
</html>
